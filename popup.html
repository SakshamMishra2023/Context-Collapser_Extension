<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saved Highlights</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Saved Highlights</h1>
            <button id="clear-all-btn" title="Clear All Highlights">Clear All</button>
        </div>
        <ul id="highlights-list">
            <!-- Saved highlights will be dynamically inserted here -->
            <li class="placeholder">No highlights saved yet. Right-click selected text on any page to save it.</li>
        </ul>
    </div>
    <script src="popup.js"></script>
</body>
</html>
